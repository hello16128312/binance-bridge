name: Quick Diagnostic

on: push

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash diag.sh 2>&1 | tee data/diag_log.txt
        continue-on-error: true
      - if: always()
        run: |
          git config user.name "Bot"
          git config user.email "bot@test"
          git add data/
          git diff --staged --quiet || git commit -m "diag"
          git push
