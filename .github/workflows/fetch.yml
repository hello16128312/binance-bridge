name: Fetch Binance Options Data

on:
  push:        # 每次push自动触发
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'  # 每1小时自动运行（可选）

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Fetch Binance Options Data
        run: python3 fetch_binance.py 2>&1 | tee data/fetch_log.txt
        continue-on-error: true
      
      - name: Commit and Push Results
        if: always()
        run: |
          git config user.name "Binance Bridge Bot"
          git config user.email "bot@binance-bridge.local"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Update Binance options data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
